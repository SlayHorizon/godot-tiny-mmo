; Web admin dashboard configuration.
;
; If [auth] token is set, every API call must include it (as a `token` field in
; the request body, or `?token=...` on GET requests). Leave it blank to disable
; auth — only safe when the dashboard is bound to localhost (see BIND_ADDRESS
; in source/server/master/dashboard/dashboard_server.gd).
;
; The live server prefers user://dashboard.cfg over this file so each deployment
; can keep its real token out of git.

[auth]
token=""
