; Web admin dashboard configuration.
;
; If [auth] token is set, every API call must include it (as a `token` field in
; the request body, or `?token=...` on GET requests). Leave it blank to disable
; auth — safe by default now that [server] bind defaults to 127.0.0.1 (loopback):
; nothing off-box can reach the admin routes regardless of token.
;
; The live server prefers user://dashboard.cfg over this file so each deployment
; can keep its real token out of git.

; CHANGE FOR YOUR DEPLOYMENT.
; - Local dev / SSH-tunnel / same-host reverse proxy: leave blank (loopback-bound).
; - Deliberately exposing on a trusted private network: set [server] bind = "*"
;   AND generate a token with `openssl rand -hex 16`, placed at user://dashboard.cfg.
[auth]
token=""

; bind: "127.0.0.1" (default, loopback only) or "*" (all interfaces — set a token!).
[server]
bind="127.0.0.1"
