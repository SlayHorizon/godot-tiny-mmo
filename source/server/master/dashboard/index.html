<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Tiny MMO — Master Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>

  <!-- Login screen -->
  <section id="loginView" class="login hidden">
    <div class="login-card">
      <h1>Tiny MMO Admin</h1>
      <p class="muted">Enter your dashboard token to sign in.</p>
      <input id="tokenInput" type="password" placeholder="Bearer token" autocomplete="current-password" />
      <button id="loginBtn">Sign in</button>
      <p id="loginErr" class="err"></p>
    </div>
  </section>

  <!-- Main app -->
  <section id="appView" class="hidden">
    <header class="topbar">
      <div class="brand">
        <strong>Tiny MMO Admin</strong>
        <span id="connDot" class="dot"></span>
        <span id="connText" class="muted">connecting…</span>
      </div>
      <div class="topbar-actions">
        <span class="muted small">Master uptime: <span id="masterUptime">—</span></span>
        <button id="refreshBtn" class="btn">Refresh</button>
        <button id="logoutBtn" class="btn ghost">Sign out</button>
      </div>
    </header>

    <main>
      <section class="card">
        <div class="card-head">
          <h2>Connected worlds</h2>
          <span class="muted small" id="worldsMeta">—</span>
        </div>
        <div class="table-wrap">
          <table class="worlds">
            <thead>
              <tr>
                <th>Name</th>
                <th>Host</th>
                <th>Players</th>
                <th>Instances</th>
                <th>World uptime</th>
                <th>Last heartbeat</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="worldsBody">
              <tr><td colspan="7" class="muted center">Loading…</td></tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>

    <!-- Broadcast modal -->
    <div id="broadcastModal" class="modal hidden">
      <div class="modal-card">
        <h3>Broadcast to <span id="broadcastTarget">world</span></h3>
        <textarea id="broadcastText" maxlength="280" placeholder="System message to send to every connected player…"></textarea>
        <div class="row">
          <button id="broadcastSend" class="btn">Send</button>
          <button id="broadcastCancel" class="btn ghost">Cancel</button>
        </div>
        <p id="broadcastErr" class="err"></p>
      </div>
    </div>
  </section>

  <script src="./app.js"></script>
</body>
</html>
